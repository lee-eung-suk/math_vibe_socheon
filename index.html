<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>수학이 팡팡! 소천 코딩 놀이터</title>
    <!-- 폰트 설정: Noto Sans KR -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <!-- 테일윈드 CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Supabase JS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --apple-blur: blur(6px);
            --apple-bg: rgba(255, 255, 255, 0.2);
            --apple-card-bg: rgba(255, 255, 255, 0.15);
            --primary-color: #6366f1;
            --accent-color: #f59e0b;
        }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            margin: 0;
            padding: 0;
            background-image: url('https://i.imgur.com/sHAsB2M.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #0f172a;
            overflow-x: hidden;
            text-shadow: 0 1px 2px rgba(255, 255, 255, 0.5);
        }

        /* 글래스모피즘 오버레이 */
        .glass-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--apple-bg);
            backdrop-filter: var(--apple-blur);
            -webkit-backdrop-filter: var(--apple-blur);
            z-index: -1;
        }

        /* 프리미엄 카드 스타일 */
        .apple-card {
            background: var(--apple-card-bg);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            transition: all 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .apple-card:hover {
            transform: scale(1.05) translateY(-5px);
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.2);
            background: rgba(255, 255, 255, 0.4);
            border-color: var(--primary-color);
        }

        /* 알약 형태 버튼 */
        .pill-button {
            border-radius: 999px;
            background: var(--primary-color);
            color: white;
            padding: 12px 28px;
            font-weight: 700;
            transition: all 0.3s ease;
            display: inline-block;
            text-align: center;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
        }

        .pill-button:hover {
            background: #4f46e5;
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(99, 102, 241, 0.5);
        }

        /* 글래스모피즘 패널 */
        .glass-panel {
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 24px;
        }

        /* 입력 폼 스타일 */
        .glass-input {
            background: rgba(255, 255, 255, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 12px;
            padding: 12px 16px;
            outline: none;
            transition: all 0.3s ease;
        }

        .glass-input:focus {
            background: rgba(255, 255, 255, 0.6);
            border-color: #0071e3;
            box-shadow: 0 0 0 4px rgba(0, 113, 227, 0.1);
        }

        /* 애니메이션 */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .fade-in {
            animation: fadeIn 0.8s ease-out forwards;
        }

        /* 부드러운 스크롤 */
        html {
            scroll-behavior: smooth;
        }

        /* 관리자 버튼 */
        .admin-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            font-size: 11px;
            color: rgba(0, 0, 0, 0.3);
            cursor: pointer;
            z-index: 1000;
            padding: 8px 12px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(4px);
            transition: all 0.3s;
            border: 1px solid rgba(0,0,0,0.05);
            user-select: none;
        }

        .admin-btn:hover {
            color: rgba(0, 0, 0, 0.6);
            background: rgba(255, 255, 255, 0.4);
        }

        /* 삭제 버튼 */
        .delete-btn {
            color: #ff3b30;
            font-size: 11px;
            font-weight: bold;
            cursor: pointer;
            margin-left: 10px;
            padding: 4px 8px;
            border-radius: 6px;
            background: rgba(255, 59, 48, 0.1);
            transition: background 0.3s;
        }

        .delete-btn:hover {
            background: rgba(255, 59, 48, 0.2);
        }
    </style>
</head>
<body>
    <div class="glass-overlay"></div>

    <!-- 상단 네비게이션 -->
    <nav class="fixed top-0 w-full z-50 bg-white/30 backdrop-blur-md border-b border-white/20">
        <div class="max-w-7xl mx-auto px-6 h-16 flex items-center justify-between">
            <div class="text-lg font-black tracking-tighter text-gray-900">
                소천초등학교 <span style="color: var(--primary-color)">바이브코딩</span>
            </div>
            <div class="flex gap-8 text-sm font-bold text-gray-700">
                <a href="#gallery" class="hover:text-indigo-600 transition-colors">작품 보기</a>
                <a href="#guestbook" class="hover:text-indigo-600 transition-colors">방명록</a>
            </div>
        </div>
    </nav>

    <!-- 메인 헤더 -->
    <header class="pt-40 pb-20 px-6 text-center">
        <div class="max-w-4xl mx-auto">
            <h1 class="text-5xl md:text-7xl font-black tracking-tighter mb-8 fade-in" style="word-break: keep-all; text-shadow: 0 2px 10px rgba(255,255,255,0.8);">
                생각을 코딩하다: <br><span style="color: var(--primary-color)">AI로 수학 게임 만들기</span>
            </h1>
            <div class="glass-panel p-8 md:p-10 fade-in" style="animation-delay: 0.2s;">
                <p class="text-lg md:text-xl text-gray-600 leading-relaxed font-medium" style="word-break: keep-all;">
                    소천초 꼬마 개발자들의 수학 게임 갤러리.<br>
                    직접 만든 게임으로 수학의 즐거움을 느껴보세요.
                </p>
            </div>
        </div>
    </header>

    <!-- 작품 갤러리 -->
    <section id="gallery" class="max-w-[1600px] mx-auto px-6 py-20">
        <div class="flex items-center justify-between mb-12">
            <h2 class="text-3xl font-bold tracking-tight">학생 작품 갤러리</h2>
            <div class="h-1 flex-1 mx-8 bg-gray-200/50 rounded-full hidden md:block"></div>
        </div>
        
        <div id="gallery-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 2xl:grid-cols-5 gap-8">
            <!-- 자바스크립트로 렌더링 -->
        </div>
    </section>

    <!-- 방명록 섹션 -->
    <section id="guestbook" class="max-w-4xl mx-auto px-6 py-32">
        <div class="text-center mb-16">
            <h2 class="text-3xl font-bold mb-4">응원의 한마디 (방명록)</h2>
            <p class="text-gray-500 font-medium">학생들의 멋진 도전을 응원해주세요!</p>
        </div>

        <!-- 방명록 입력 폼 -->
        <div class="glass-panel p-8 mb-16">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <input type="text" id="guest-name" placeholder="이름" class="glass-input md:col-span-1">
                <input type="text" id="guest-content" placeholder="응원 메시지를 남겨주세요" class="glass-input md:col-span-2">
                <button onclick="addMessage()" class="pill-button w-full h-full">남기기</button>
            </div>
        </div>

        <!-- 방명록 리스트 -->
        <div id="guestbook-list" class="space-y-4">
            <!-- 자바스크립트로 렌더링 -->
        </div>
    </section>

    <!-- 푸터 -->
    <footer class="py-32 text-center text-gray-400 text-sm font-bold tracking-widest">
        <p>© 2026 소천초등학교 수학 바이브코딩 전시회. 모든 권리 보유.</p>
    </footer>

    <!-- 관리자 버튼 -->
    <div class="admin-btn" onclick="adminLogin()">관리자</div>

    <script>
        // 1. Supabase 설정 및 연결
        const SUPABASE_URL = 'https://uihdvkezxlilaieaygte.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVpaGR2a2V6eGxpbGFpZWF5Z3RlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwNDQyNDcsImV4cCI6MjA5MTYyMDI0N30.sMYU39Bi4YEQYC0KWE3qt5Az3KzbdouhcFfcvI52hJQ';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let isAdmin = false;

        // 학생 데이터
        const students = [
            { grade: 3, name: "정하온", link: "https://whimsical-beignet-5166a0.netlify.app/" },
            { grade: 3, name: "이승하", link: "https://exquisite-cendol-f49f4a.netlify.app/" },
            { grade: 3, name: "이지훈", link: "https://earnest-syrniki-eb43a3.netlify.app/" },
            { grade: 3, name: "이지호", link: "https://effortless-beijinho-c83792.netlify.app/" },
            { grade: 2, name: "남하늘", link: "https://jocular-brigadeiros-ae812c.netlify.app/" },
            { grade: 2, name: "정라온", link: "https://shiny-crostata-646197.netlify.app/" }
        ];

        // 갤러리 렌더링
        const galleryGrid = document.getElementById('gallery-grid');
        students.forEach((student, index) => {
            const card = document.createElement('div');
            card.className = 'apple-card p-10 flex flex-col items-center text-center fade-in';
            card.style.animationDelay = `${index * 0.05}s`;
            card.innerHTML = `
                <div class="w-20 h-20 bg-indigo-100/50 rounded-3xl flex items-center justify-center mb-8 shadow-inner">
                    <span class="text-3xl font-black text-indigo-600">${student.grade}</span>
                </div>
                <div class="mb-3 text-xs font-black text-indigo-500 uppercase tracking-[0.2em]">${student.grade}학년</div>
                <h3 class="text-3xl font-black mb-10 text-gray-900 tracking-tighter">${student.name}</h3>
                <a href="${student.link}" target="_blank" class="pill-button text-sm w-full">게임 즐기기</a>
            `;
            galleryGrid.appendChild(card);
        });

        // 2. 방명록 로직 (Table: guestbook)
        async function fetchMessages() {
            const { data, error } = await supabaseClient
                .from('guestbook')
                .select('*')
                .order('created_at', { ascending: false });

            if (error) {
                console.error('데이터를 가져오는 중 오류 발생:', error);
                return;
            }
            renderMessages(data);
        }

        // 방명록 렌더링
        function renderMessages(messages) {
            const list = document.getElementById('guestbook-list');
            list.innerHTML = '';
            
            if (!messages || messages.length === 0) {
                list.innerHTML = '<div class="text-center py-10 text-gray-400 font-medium">첫 번째 응원 메시지를 남겨보세요!</div>';
                return;
            }

            messages.forEach((msg) => {
                const item = document.createElement('div');
                item.className = 'glass-panel p-8 fade-in shadow-lg flex justify-between items-start';
                item.innerHTML = `
                    <div class="flex-1">
                        <div class="flex items-center gap-3 mb-3">
                            <span class="font-black text-gray-900 text-lg">${msg.name}</span>
                            <span class="text-xs text-gray-400 font-bold">${new Date(msg.created_at).toLocaleDateString()}</span>
                            ${isAdmin ? `<span class="delete-btn" onclick="deleteMessage(${msg.id})">삭제</span>` : ''}
                        </div>
                        <p class="text-gray-600 font-medium text-lg leading-relaxed keep-all">${msg.content}</p>
                    </div>
                `;
                list.appendChild(item);
            });
        }

        // 등록하기
        async function addMessage() {
            const name = document.getElementById('guest-name').value.trim();
            const content = document.getElementById('guest-content').value.trim();
            
            if (!name || !content) {
                alert('이름과 내용을 모두 입력해주세요!');
                return;
            }

            // created_at 값을 명시적으로 전송하여 Not-Null 제약 조건 오류 해결
            const { error } = await supabaseClient
                .from('guestbook')
                .insert([{ 
                    name, 
                    content, 
                    created_at: new Date().toISOString() 
                }]);

            if (error) {
                alert(`등록 중 오류가 발생했습니다: ${error.message}`);
                console.error('Supabase Insert Error:', error);
            } else {
                document.getElementById('guest-name').value = '';
                document.getElementById('guest-content').value = '';
                fetchMessages();
            }
        }

        // 3. 관리자 모드 구현
        function adminLogin() {
            if (isAdmin) {
                if (confirm("관리자 모드를 해제하시겠습니까?")) {
                    isAdmin = false;
                    const btn = document.querySelector('.admin-btn');
                    btn.innerText = "관리자";
                    btn.style.color = "rgba(0,0,0,0.3)";
                    btn.style.background = "rgba(255, 255, 255, 0.2)";
                    fetchMessages();
                }
                return;
            }

            const id = prompt("관리자 아이디를 입력하세요.");
            if (id === null) return;
            const pw = prompt("관리자 비밀번호를 입력하세요.");
            if (pw === null) return;

            if (id === 'sc6727414' && pw === 'sc6727414') {
                isAdmin = true;
                const btn = document.querySelector('.admin-btn');
                btn.innerText = "관리자 (로그아웃)";
                btn.style.color = "#4f46e5";
                btn.style.background = "rgba(99, 102, 241, 0.1)";
                alert("관리자 모드로 전환되었습니다.");
                fetchMessages();
            } else {
                alert("아이디 또는 비밀번호가 일치하지 않습니다.");
            }
        }

        // 삭제 기능
        async function deleteMessage(id) {
            if (!id) {
                alert("삭제할 메시지의 ID가 없습니다. DB에 'id' 컬럼이 있는지 확인해주세요.");
                return;
            }
            if (!confirm("정말 이 메시지를 삭제하시겠습니까?")) return;

            const { error } = await supabaseClient
                .from('guestbook')
                .delete()
                .eq('id', id);

            if (error) {
                alert(`삭제 중 오류가 발생했습니다: ${error.message}`);
                console.error('Supabase Delete Error:', error);
            } else {
                fetchMessages();
            }
        }

        // 초기 실행
        fetchMessages();

        // 부드러운 스크롤 이벤트
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function (e) {
                e.preventDefault();
                const target = document.querySelector(this.getAttribute('href'));
                if (target) {
                    window.scrollTo({
                        top: target.offsetTop - 80,
                        behavior: 'smooth'
                    });
                }
            });
        });
    </script>
</body>
</html>
