<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>수학이 팡팡! 소천 코딩 놀이터</title>
    <!-- 폰트 설정: Noto Sans KR -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <!-- 테일윈드 CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --apple-blur: blur(6px);
            --apple-bg: rgba(255, 255, 255, 0.2);
            --apple-card-bg: rgba(255, 255, 255, 0.15);
            --primary-color: #6366f1;
            --accent-color: #f59e0b;
        }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            margin: 0;
            padding: 0;
            background-image: url('https://i.imgur.com/sHAsB2M.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #0f172a;
            overflow-x: hidden;
            text-shadow: 0 1px 2px rgba(255, 255, 255, 0.5);
        }

        /* 글래스모피즘 오버레이 */
        .glass-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--apple-bg);
            backdrop-filter: var(--apple-blur);
            -webkit-backdrop-filter: var(--apple-blur);
            z-index: -1;
        }

        /* 프리미엄 카드 스타일 */
        .apple-card {
            background: var(--apple-card-bg);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            transition: all 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .apple-card:hover {
            transform: scale(1.05) translateY(-5px);
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.2);
            background: rgba(255, 255, 255, 0.4);
            border-color: var(--primary-color);
        }

        /* 알약 형태 버튼 */
        .pill-button {
            border-radius: 999px;
            background: var(--primary-color);
            color: white;
            padding: 12px 28px;
            font-weight: 700;
            transition: all 0.3s ease;
            display: inline-block;
            text-align: center;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
        }

        .pill-button:hover {
            background: #4f46e5;
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(99, 102, 241, 0.5);
        }

        /* 글래스모피즘 패널 */
        .glass-panel {
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 24px;
        }

        /* 입력 폼 스타일 */
        .glass-input {
            background: rgba(255, 255, 255, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 12px;
            padding: 12px 16px;
            outline: none;
            transition: all 0.3s ease;
        }

        .glass-input:focus {
            background: rgba(255, 255, 255, 0.6);
            border-color: #0071e3;
            box-shadow: 0 0 0 4px rgba(0, 113, 227, 0.1);
        }

        /* 애니메이션 */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .fade-in {
            animation: fadeIn 0.8s ease-out forwards;
        }

        /* 부드러운 스크롤 */
        html {
            scroll-behavior: smooth;
        }
    </style>
</head>
<body>
    <div class="glass-overlay"></div>

    <!-- 상단 네비게이션 -->
    <nav class="fixed top-0 w-full z-50 bg-white/30 backdrop-blur-md border-b border-white/20">
        <div class="max-w-7xl mx-auto px-6 h-16 flex items-center justify-between">
            <div class="text-lg font-black tracking-tighter text-gray-900">
                소천초등학교 <span style="color: var(--primary-color)">바이브코딩</span>
            </div>
            <div class="flex gap-8 text-sm font-bold text-gray-700">
                <a href="#gallery" class="hover:text-indigo-600 transition-colors">작품 보기</a>
                <a href="#guestbook" class="hover:text-indigo-600 transition-colors">방명록</a>
            </div>
        </div>
    </nav>

    <!-- 메인 헤더 -->
    <header class="pt-40 pb-20 px-6 text-center">
        <div class="max-w-4xl mx-auto">
            <h1 class="text-5xl md:text-7xl font-black tracking-tighter mb-8 fade-in" style="word-break: keep-all; text-shadow: 0 2px 10px rgba(255,255,255,0.8);">
                수학이 팡팡! <br><span style="color: var(--primary-color)">소천 코딩 놀이터</span>
            </h1>
            <div class="glass-panel p-8 md:p-10 fade-in" style="animation-delay: 0.2s;">
                <p class="text-lg md:text-xl text-gray-600 leading-relaxed font-medium" style="word-break: keep-all;">
                    소천초 꼬마 개발자들의 수학 게임 갤러리.<br>
                    직접 만든 게임으로 수학의 즐거움을 느껴보세요.
                </p>
            </div>
        </div>
    </header>

    <!-- 작품 갤러리 -->
    <section id="gallery" class="max-w-[1600px] mx-auto px-6 py-20">
        <div class="flex items-center justify-between mb-12">
            <h2 class="text-3xl font-bold tracking-tight">학생 작품 갤러리</h2>
            <div class="h-1 flex-1 mx-8 bg-gray-200/50 rounded-full hidden md:block"></div>
        </div>
        
        <div id="gallery-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 2xl:grid-cols-5 gap-8">
            <!-- 자바스크립트로 렌더링 -->
        </div>
    </section>

    <!-- 방명록 섹션 -->
    <section id="guestbook" class="max-w-4xl mx-auto px-6 py-32">
        <div class="text-center mb-16">
            <h2 class="text-3xl font-bold mb-4">응원의 한마디 (방명록)</h2>
            <p class="text-gray-500 font-medium">학생들의 멋진 도전을 응원해주세요!</p>
        </div>

        <!-- 방명록 입력 폼 -->
        <div class="glass-panel p-8 mb-16">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <input type="text" id="guest-name" placeholder="이름" class="glass-input md:col-span-1">
                <input type="text" id="guest-content" placeholder="응원 메시지를 남겨주세요" class="glass-input md:col-span-2">
                <button onclick="addMessage()" class="pill-button w-full h-full">남기기</button>
            </div>
        </div>

        <!-- 방명록 리스트 -->
        <div id="guestbook-list" class="space-y-4">
            <!-- 자바스크립트로 렌더링 -->
        </div>
    </section>

    <!-- 푸터 -->
    <footer class="py-20 text-center text-gray-400 text-sm font-medium">
        <p>© 2026 소천초등학교 바이브코딩 전시회. 모든 권리 보유.</p>
    </footer>

    <script>
        // 학생 데이터
        const students = [
            { grade: 6, name: "이한솔" },
            { grade: 6, name: "주은혜" },
            { grade: 4, name: "주사랑" },
            { grade: 4, name: "송설" },
            { grade: 3, name: "정하온" },
            { grade: 3, name: "이승하" },
            { grade: 3, name: "이지훈" },
            { grade: 3, name: "이지호" },
            { grade: 2, name: "남하늘" },
            { grade: 2, name: "정라온" }
        ];

        // 갤러리 렌더링
        const galleryGrid = document.getElementById('gallery-grid');
        students.forEach((student, index) => {
            const card = document.createElement('div');
            card.className = 'apple-card p-8 flex flex-col items-center text-center fade-in';
            card.style.animationDelay = `${index * 0.05}s`;
            card.innerHTML = `
                <div class="w-16 h-16 bg-indigo-100/50 rounded-2xl flex items-center justify-center mb-6">
                    <span class="text-2xl font-bold text-indigo-600">${student.grade}</span>
                </div>
                <div class="mb-2 text-sm font-black text-indigo-500 uppercase tracking-widest">${student.grade}학년</div>
                <h3 class="text-2xl font-black mb-8 text-gray-900">${student.name}</h3>
                <a href="#" target="_blank" class="pill-button text-sm w-full">게임 즐기기</a>
            `;
            galleryGrid.appendChild(card);
        });

        // 방명록 로직
        const guestbookList = document.getElementById('guestbook-list');
        let messages = JSON.parse(localStorage.getItem('socheon_messages')) || [
            { name: "선생님", content: "모두들 정말 고생 많았어요! 수학이 이렇게 즐거울 수 있다니 놀랍네요.", date: "2026.04.12" },
            { name: "학부모", content: "우리 아이들의 창의력에 박수를 보냅니다. 최고예요!", date: "2026.04.12" }
        ];

        function renderMessages() {
            guestbookList.innerHTML = '';
            messages.forEach((msg, index) => {
                const item = document.createElement('div');
                item.className = 'glass-panel p-6 fade-in';
                item.innerHTML = `
                    <div class="flex justify-between items-start mb-2">
                        <span class="font-bold text-gray-900">${msg.name}</span>
                        <span class="text-xs text-gray-400 font-medium">${msg.date}</span>
                    </div>
                    <p class="text-gray-600 font-medium" style="word-break: break-all;">${msg.content}</p>
                `;
                guestbookList.appendChild(item);
            });
        }

        function addMessage() {
            const nameInput = document.getElementById('guest-name');
            const contentInput = document.getElementById('guest-content');
            
            if (!nameInput.value.trim() || !contentInput.value.trim()) {
                alert('이름과 내용을 모두 입력해주세요!');
                return;
            }

            const now = new Date();
            const dateStr = `${now.getFullYear()}.${String(now.getMonth() + 1).padStart(2, '0')}.${String(now.getDate()).padStart(2, '0')}`;

            const newMessage = {
                name: nameInput.value,
                content: contentInput.value,
                date: dateStr
            };

            messages.unshift(newMessage);
            localStorage.setItem('socheon_messages', JSON.stringify(messages));
            
            nameInput.value = '';
            contentInput.value = '';
            
            renderMessages();
        }

        // 초기 렌더링
        renderMessages();

        // 부드러운 스크롤 이벤트 (네비게이션)
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function (e) {
                e.preventDefault();
                const target = document.querySelector(this.getAttribute('href'));
                if (target) {
                    window.scrollTo({
                        top: target.offsetTop - 80,
                        behavior: 'smooth'
                    });
                }
            });
        });
    </script>
</body>
</html>
